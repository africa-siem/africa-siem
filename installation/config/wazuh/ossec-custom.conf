<!-- =========================================================================
     SIEM AFRICA - Configuration Wazuh Manager
     =========================================================================
     Fichier : fragments ajoutés à /var/ossec/etc/ossec.conf par 06-integration.sh
     
     Contenu : UNIQUEMENT configuration moteur et sources de logs.
               Les règles de détection proviennent :
                 - Du ruleset Wazuh par défaut (~2000 règles communautaires)
                 - Des règles Snort (via snort-fast)
                 - Du Module 2 (base de données) pour enrichissement MITRE
     
     PAS de règles custom ici (choix architectural).
     ========================================================================= -->

<ossec_config>

  <!-- ====================================================================
       SOURCES DE LOGS
       ==================================================================== 
       Wazuh lit ces fichiers en continu pour analyser les événements
       ==================================================================== -->

  <!-- HARD-WON FIX V1 : log_format="snort-fast" (PAS "snort" seul) -->
  <localfile>
    <log_format>snort-fast</log_format>
    <location>/var/log/snort/alert</location>
  </localfile>

  <!-- Logs authentification (SSH, sudo, login) - CRITIQUE -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Logs système généraux -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Logs kernel (détection DoS, anomalies réseau) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <!-- Logs installations paquets -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>


  <!-- ====================================================================
       FILE INTEGRITY MONITORING (Syscheck)
       ==================================================================== 
       Surveille les modifications de fichiers critiques.
       Génère une alerte si un fichier protégé est modifié.
       ==================================================================== -->
  <syscheck>
    <frequency>43200</frequency>

    <!-- Temps réel : changements détectés immédiatement -->
    <directories realtime="yes" check_all="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/usr/bin</directories>
    <directories realtime="yes" check_all="yes">/usr/sbin</directories>
    <directories realtime="yes" check_all="yes">/bin</directories>
    <directories realtime="yes" check_all="yes">/sbin</directories>

    <!-- Protection des configs SIEM Africa -->
    <directories realtime="yes" check_all="yes">/etc/siem-africa</directories>
    <directories realtime="yes" check_all="yes">/etc/snort</directories>
    <directories realtime="yes" check_all="yes">/var/ossec/etc</directories>

    <!-- Exclusions (trop verbeux, faux positifs) -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore type="sregex">.log$|.swp$|.tmp$|.bak$</ignore>

    <process_priority>10</process_priority>
    <max_eps>50</max_eps>
  </syscheck>


  <!-- ====================================================================
       ROOTCHECK
       ==================================================================== 
       Détection de rootkits et anomalies système
       ==================================================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <skip_nfs>yes</skip_nfs>
  </rootcheck>


  <!-- ====================================================================
       VULNERABILITY DETECTOR
       ==================================================================== 
       Scan automatique des CVE sur les paquets installés
       ==================================================================== -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>24h</interval>
    <min_full_scan_interval>6h</min_full_scan_interval>
    <run_on_start>yes</run_on_start>

    <provider name="canonical">
      <enabled>yes</enabled>
      <os>focal</os>
      <os>jammy</os>
      <os>noble</os>
      <update_interval>1h</update_interval>
    </provider>

    <provider name="debian">
      <enabled>yes</enabled>
      <os>bullseye</os>
      <os>bookworm</os>
      <update_interval>1h</update_interval>
    </provider>

    <provider name="nvd">
      <enabled>yes</enabled>
      <update_from_year>2020</update_from_year>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>


  <!-- ====================================================================
       ACTIVE RESPONSE - DÉSACTIVÉ
       ==================================================================== 
       La réponse active (blocage iptables) est déléguée au Module 3
       (Agent Python) qui applique une corrélation multi-sources.
       ==================================================================== -->
  <active-response>
    <disabled>yes</disabled>
  </active-response>


  <!-- ====================================================================
       ALERTING
       ==================================================================== -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>


  <!-- ====================================================================
       LOGGING
       ==================================================================== -->
  <logging>
    <log_format>plain,json</log_format>
  </logging>


  <!-- ====================================================================
       CLUSTER - Désactivé (single-node pour PME)
       ==================================================================== -->
  <cluster>
    <name>siem-africa-cluster</name>
    <node_name>node01</node_name>
    <node_type>master</node_type>
    <key></key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>127.0.0.1</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

</ossec_config>

<!-- =========================================================================
     Fin de la configuration Wazuh
     =========================================================================
     
     Règles utilisées :
       1. Ruleset Wazuh par défaut (installé avec le paquet)
          → /var/ossec/ruleset/rules/
          → ~2000 règles communautaires maintenues par Wazuh Inc.
     
       2. Règles Snort (via snort-fast log_format)
          → Analysées par le decoder Snort de Wazuh
          → Les règles elles-mêmes viennent d'Emerging Threats
     
       3. Enrichissement MITRE ATT&CK
          → Géré par le Module 2 (base de données SQLite)
          → L'agent Python (Module 3) fait le mapping
     
     Aucune règle custom SIEM Africa dans Wazuh directement.
     ========================================================================= -->
